name: Update package versions
on:
  workflow_run:
    workflows:
      - "Build Docker Image"
    types:
      - "completed"
    branches:
      - "develop"
  pull_request:
    paths:
      - ".github/workflows/versions.yml"
  push:
    branches:
      - "develop"
    paths:
      - ".github/workflows/versions.yml"

jobs:
  versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Update package versions
        uses: docker://ghcr.io/anchore/syft:v1.46.0@sha256:473a60e3a58e29aca3aedb3e99e787bb4ef273917e44d10fcbea4330a07320bb
        with:
          args: ghcr.io/${{ github.repository_owner }}/sonarr:develop -o table=package_versions.txt

      - name: Commit changes
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package_versions.txt
          if git diff --staged --quiet; then
            echo "No changes since last run"
          else
            git commit -m "Updating Package Versions"
            git push
          fi
